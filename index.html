<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/employee-ops-tracker/favicon.ico" />
    <link rel="manifest" href="/employee-ops-tracker/manifest.json" />
    <title>Employee Ops Tracker</title>
    <script>
      // Restore route saved by 404.html — runs before React mounts
      (function() {
        var route = sessionStorage.getItem('spa_redirect');
        if (route) {
          sessionStorage.removeItem('spa_redirect');
          // Use pushState so the restored route is a real history entry
          // — back button goes to the previous external page, not a 404
          window.history.pushState(null, null, '/employee-ops-tracker' + route);
        }
      })();
    </script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    </style>
    <script type="module" crossorigin src="/employee-ops-tracker/assets/index-C--ILVLC.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
