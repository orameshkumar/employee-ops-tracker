<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Employee Ops Tracker</title>
    <script>
      // Store the intended path in sessionStorage, then redirect to index.html.
      // Using sessionStorage (not replaceState) so the original URL stays in
      // browser history — back/forward navigation works correctly.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      // Strip the repo base (/employee-ops-tracker) from the path
      var base = '/employee-ops-tracker';
      var route = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem('spa_redirect', route + search + hash);
      window.location.href = base + '/';
    </script>
  </head>
  <body></body>
</html>
